services:
  - type: web
    name: securepath
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: GROQ_API_KEY
        sync: false          # Set manually in Render dashboard — never commit
      - key: EXAI_PROVIDER
        value: groq
      - key: EXAI_MODEL
        value: llama-3.3-70b-versatile
      - key: ADMIN_PASSWORD
        sync: false          # Set manually in Render dashboard
      - key: FLASK_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: securepath-db
          property: connectionString

  - type: pserv        # Render free PostgreSQL database (90-day free tier)
    name: securepath-db
    plan: free
    databaseName: securepath
    user: securepath

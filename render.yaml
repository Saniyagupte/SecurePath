services:
  - type: web
    name: securepath
    runtime: docker
    dockerfilePath: ./Dockerfile
    # Render injects PORT automatically — gunicorn reads it via ${PORT:-8000}
    envVars:
      - key: GROQ_API_KEY
        sync: false          # set this manually in Render dashboard — never commit
      - key: EXAI_PROVIDER
        value: groq
      - key: EXAI_MODEL
        value: llama-3.3-70b-versatile
      - key: ADMIN_PASSWORD
        sync: false          # set this manually in Render dashboard
      - key: DATA_DIR
        value: /data         # points at the persistent disk mount below
      - key: FLASK_ENV
        value: production

    # Persistent disk — this is the ONE thing that makes the database survive redeploys
    disk:
      name: securepath-data
      mountPath: /data
      sizeGB: 1              # 1 GB is plenty for SQLite + PDFs for a long time
